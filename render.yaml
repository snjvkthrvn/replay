services:
  - type: web
    name: replay-api
    runtime: docker
    plan: free
    region: oregon
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: RUN_MIGRATIONS
        value: "true"
      - key: DATABASE_URL
        fromDatabase:
          name: replay-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: replay-redis
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: SPOTIFY_CLIENT_ID
        sync: false
      - key: SPOTIFY_CLIENT_SECRET
        sync: false
      - key: SPOTIFY_REDIRECT_URI
        value: replay://
      - key: ALLOWED_ORIGINS
        value: https://replay-api.onrender.com,replay://

  - type: keyvalue
    name: replay-redis
    plan: free
    region: oregon
    maxmemoryPolicy: noeviction
    ipAllowList: []

databases:
  - name: replay-db
    plan: free
    region: oregon
    databaseName: replay
    user: replay
    postgresMajorVersion: "17"
